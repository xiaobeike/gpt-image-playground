<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Image Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:light}
:root{
  --bg:#f5f5f7;--surface:#fff;--surface2:#fafafa;--surface3:#f0f0f2;
  --border:#e0e0e3;--border2:#d1d1d6;--text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --primary:#10a37f;--primary-hover:#0d8c6d;--primary-light:rgba(16,163,127,.08);--primary-light2:rgba(16,163,127,.14);
  --danger:#ff3b30;--danger-light:rgba(255,59,48,.08);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.1);
  --transition:.2s cubic-bezier(.4,0,.2,1);
}
.dark{
  --bg:#0a0a0a;--surface:#161616;--surface2:#1c1c1e;--surface3:#2c2c2e;
  --border:#2c2c2e;--border2:#3a3a3c;--text:#f5f5f7;--text2:#98989d;--text3:#636366;
  --primary:#34c79a;--primary-hover:#4dd9af;--primary-light:rgba(52,199,154,.1);--primary-light2:rgba(52,199,154,.2);
  --danger:#ff453a;--danger-light:rgba(255,69,58,.12);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow-lg:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans CJK SC','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition);overflow:hidden;-webkit-font-smoothing:antialiased}
.dark{color-scheme:dark}

/* Keep core UI text/colors stable even when extensions inject page-wide styles. */
.ui-text,.ui-text *{color:inherit}
.ui-label,.ui-label *{
  color:inherit !important;
  -webkit-text-fill-color:currentColor !important;
  opacity:1 !important;
  visibility:visible !important;
  filter:none !important;
  text-shadow:none !important;
  mix-blend-mode:normal !important;
  position:relative;
  z-index:1;
}
.ui-label{
  display:inline-block;
  vertical-align:middle;
  font:inherit !important;
  line-height:inherit !important;
  letter-spacing:inherit !important;
  text-indent:0 !important;
  white-space:inherit !important;
  overflow:visible !important;
  transform:none !important;
  clip-path:none !important;
  mask:none !important;
  -webkit-mask:none !important;
  isolation:isolate;
}
.header h1,.header h1 *,.header-actions .btn,.header-actions .btn *,.header-actions .icon-btn,.header-actions .icon-btn *,.tab,.tab *,.form-group>label,.toggle-row>span,.result-placeholder,.history-header h3,.modal h2,.modal label,.btn,.btn *,.icon-btn,.icon-btn *{
  -webkit-text-fill-color:currentColor;
}
.tab,.btn,.opt-group label,.form-group>label,.toggle-row>span,.history-header h3,.modal-actions button,.lightbox-actions button{
  isolation:isolate;
}
.header h1>.ui-label:first-child{color:var(--text) !important;-webkit-text-fill-color:var(--text) !important}
.header h1>.ui-label:last-child{color:var(--primary) !important;-webkit-text-fill-color:var(--primary) !important}
#langBtn .ui-label,.header-actions .btn .ui-label,.icon-btn .ui-label{color:var(--text2) !important;-webkit-text-fill-color:var(--text2) !important}
.tab .ui-label{color:var(--text2) !important;-webkit-text-fill-color:var(--text2) !important}
.tab.active .ui-label,.tab:hover .ui-label{color:var(--text) !important;-webkit-text-fill-color:var(--text) !important}
.form-group>label .ui-label,.modal label .ui-label,.history-header .ui-label{color:var(--text2) !important;-webkit-text-fill-color:var(--text2) !important}
.toggle-row .ui-label{color:var(--text) !important;-webkit-text-fill-color:var(--text) !important}
.result-placeholder .ui-label,.upload-zone .ui-label,.hint.ui-label{color:var(--text3) !important;-webkit-text-fill-color:var(--text3) !important}
.btn .ui-label{color:var(--text) !important;-webkit-text-fill-color:var(--text) !important}
.btn-primary .ui-label{color:#fff !important;-webkit-text-fill-color:#fff !important}
.btn-danger .ui-label{color:var(--danger) !important;-webkit-text-fill-color:var(--danger) !important}
.btn-danger:hover .ui-label{color:#fff !important;-webkit-text-fill-color:#fff !important}
.opt-group label .ui-label{color:var(--text2) !important;-webkit-text-fill-color:var(--text2) !important}
.opt-group input:checked+span.ui-label,
.opt-group label:has(input:checked) .ui-label{color:var(--primary) !important;-webkit-text-fill-color:var(--primary) !important}
.btn svg,.icon-btn svg{stroke:currentColor;fill:none;flex-shrink:0}

/* ===== Header ===== */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-left{display:flex;align-items:center;gap:10px}
.header h1{font-size:16px;font-weight:700;white-space:nowrap;letter-spacing:-.01em}
.header h1 span{font-size:12px;color:var(--text2);font-weight:500;margin-left:8px;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:20px;font-size:11px}
.header-actions{display:flex;align-items:center;gap:4px}

/* ===== Buttons ===== */
.btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:all var(--transition);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;user-select:none;font-weight:500;line-height:1.25;-webkit-appearance:none;appearance:none;font-family:inherit;text-rendering:optimizeLegibility}
.btn:hover{border-color:var(--border2);background:var(--surface2)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(16,163,127,.25)}
.btn-primary:hover{background:var(--primary-hover);border-color:var(--primary-hover);color:#fff;box-shadow:0 2px 8px rgba(16,163,127,.3)}
.btn-primary:active{transform:scale(.97);box-shadow:0 1px 2px rgba(16,163,127,.2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--radius-xs)}
.btn-danger{border-color:var(--danger);color:var(--danger);background:var(--danger-light)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ghost{border:none;background:none;color:var(--text2);padding:6px 8px;border-radius:var(--radius-xs)}
.btn-ghost:hover{color:var(--text);background:var(--surface3)}
.btn-ghost:active{background:var(--border)}
.icon-btn{width:34px;height:34px;padding:0;justify-content:center;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:16px;transition:all var(--transition);display:inline-flex;align-items:center}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.icon-btn:active{transform:scale(.93)}

/* ===== Main layout ===== */
.main{display:flex;height:calc(100vh - 52px)}
.sidebar{width:380px;min-width:340px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar::-webkit-scrollbar-thumb:hover{background:var(--border2)}
.content{flex:1;overflow-y:auto;padding:28px;display:flex;flex-direction:column;align-items:center;scrollbar-width:thin}

/* ===== Tabs ===== */
.tabs{display:flex;gap:2px;background:var(--surface3);border-radius:var(--radius-sm);padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-radius:var(--radius-xs);transition:all var(--transition);font-weight:500;text-align:center;display:flex;align-items:center;justify-content:center;min-height:34px;line-height:1.25}
.tab.active{color:var(--text);background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
.tab:not(.disabled):hover{color:var(--text)}
.tab.disabled{opacity:.35;cursor:default;pointer-events:none;font-size:12px}

/* ===== Form groups ===== */
.form-group{margin-bottom:16px}
.form-group>label{display:block;font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.form-group .hint{font-weight:400;color:var(--text3);font-size:11px;text-transform:none;letter-spacing:0;margin-left:4px}
textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;background:var(--surface2);color:var(--text);resize:vertical;min-height:80px;font-family:inherit;transition:border var(--transition),box-shadow var(--transition);line-height:1.6}
textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
textarea::placeholder{color:var(--text3)}
select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:border var(--transition);appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 4.5L6 7.5L9 4.5' stroke='%2386868b' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}

/* ===== Option groups ===== */
.opt-group{display:flex;flex-wrap:wrap;gap:5px}
.opt-group label{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;gap:3px;color:var(--text2);font-weight:500;margin-bottom:0;background:var(--surface)}
.opt-group input{display:none}
.opt-group label:hover{border-color:var(--border2);background:var(--surface2)}
.opt-group input:checked+span{color:var(--primary)}
.opt-group label:has(input:checked){border-color:var(--primary);color:var(--primary);background:var(--primary-light);font-weight:600}

/* ===== Toggle ===== */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius-sm)}
.toggle-row>span{font-size:13px;font-weight:500;color:var(--text)}
.toggle{width:42px;height:24px;background:var(--border2);border-radius:12px;position:relative;cursor:pointer;transition:background var(--transition);flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left var(--transition);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on::after{left:20px;box-shadow:0 1px 4px rgba(16,163,127,.3)}

/* ===== Number input ===== */
.num-input{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.num-input button{width:34px;height:34px;border:none;background:none;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.num-input button:hover{background:var(--primary-light);color:var(--primary)}
.num-input button:active{background:var(--primary-light2)}
.num-input input{width:40px;text-align:center;border:none;background:none;color:var(--text);font-size:14px;font-weight:600;padding:6px 0}
.num-input input:focus{outline:none}
.num-input input::-webkit-inner-spin-button{display:none}

/* ===== Upload ===== */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all var(--transition);position:relative;background:var(--surface2)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone p{color:var(--text2);font-size:13px;font-weight:500}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.upload-preview .thumb{width:60px;height:60px;border-radius:var(--radius-xs);overflow:hidden;position:relative;border:1px solid var(--border);cursor:pointer;transition:all var(--transition);box-shadow:var(--shadow)}
.upload-preview .thumb:hover{border-color:var(--primary);transform:scale(1.05)}
.upload-preview .thumb img{width:100%;height:100%;object-fit:cover}
.upload-preview .thumb .remove{position:absolute;top:3px;right:3px;width:18px;height:18px;background:var(--danger);color:#fff;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;opacity:0;transition:opacity .15s;font-weight:700}
.upload-preview .thumb:hover .remove{opacity:1}

/* ===== Result area ===== */
.result-area{width:100%;max-width:800px}
.result-placeholder{width:100%;min-height:320px;background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:14px;gap:12px}
.result-placeholder svg{width:48px;height:48px;opacity:.2}
.result-images{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);max-width:100%;transition:box-shadow var(--transition)}
.result-card:hover{box-shadow:var(--shadow-lg)}
.result-card img{max-width:100%;max-height:600px;display:block;cursor:zoom-in}
.result-card .actions{padding:10px 12px;display:flex;gap:8px;justify-content:center;border-top:1px solid var(--border);background:var(--surface2)}

/* ===== History ===== */
.history-section{margin-top:32px;width:100%;max-width:800px}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.history-header h3{font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.history-grid{display:flex;flex-wrap:wrap;gap:8px}
.history-item{width:60px;height:60px;border-radius:var(--radius-xs);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all var(--transition);position:relative;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.history-item:hover{border-color:var(--primary);transform:scale(1.08)}
.history-item img{width:100%;height:100%;object-fit:cover}

/* ===== Loading ===== */
.loading{display:none;flex-direction:column;align-items:center;gap:16px;padding:48px}
.loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);font-weight:500}

/* ===== Stream preview ===== */
.stream-preview{display:none;max-width:512px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin:0 auto;box-shadow:var(--shadow)}
.stream-preview.show{display:block}
.stream-preview img{width:100%;display:block;image-rendering:auto}

/* ===== Modal ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:420px;max-width:90vw;box-shadow:var(--shadow-lg);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
.modal h2{font-size:17px;margin-bottom:20px;font-weight:700;letter-spacing:-.01em}
.modal .form-group{margin-bottom:16px}
.modal .form-group>label{margin-bottom:6px}
.modal input[type=text],.modal input[type=password],.modal input[type=url]{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);transition:border var(--transition),box-shadow var(--transition)}
.modal input[type=text]:focus,.modal input[type=password]:focus,.modal input[type=url]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.modal input::placeholder{color:var(--text3)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:24px}

/* ===== Lightbox ===== */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .2s ease}
.lightbox.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox img{max-width:95vw;max-height:92vh;object-fit:contain;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.5);animation:zoomIn .25s ease}
@keyframes zoomIn{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
.lightbox-close{position:fixed;top:16px;right:16px;color:rgba(255,255,255,.8);font-size:22px;cursor:pointer;z-index:301;background:rgba(255,255,255,.12);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);transition:all .15s;font-weight:300}
.lightbox-close:hover{background:rgba(255,255,255,.2);color:#fff}
.lightbox-actions{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:301}
.lightbox-actions .btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:500}
.lightbox-actions .btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.25)}

/* ===== Mask canvas ===== */
.mask-container{position:relative;display:none;margin-top:10px}
.mask-container.show{display:block}
.mask-container canvas{border:1px solid var(--border);border-radius:var(--radius-sm);cursor:crosshair;max-width:100%}
.mask-toolbar{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.mask-toolbar input[type=range]{width:80px;accent-color:var(--primary)}

/* ===== Toast ===== */
.toast{position:fixed;top:62px;right:20px;padding:12px 20px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-lg);font-size:13px;z-index:400;transform:translateX(120%);transition:transform .35s cubic-bezier(.4,0,.2,1);font-weight:500;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast.show{transform:translateX(0)}
.toast.error{border-color:var(--danger);color:var(--danger);background:var(--danger-light)}
.toast.success{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}

/* ===== Progress ===== */
.progress-bar{width:100%;max-width:512px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px auto}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-hover));border-radius:2px;transition:width .4s ease;width:0%}

/* ===== Generate button special ===== */
.generate-btn{width:100%;padding:12px;font-size:14px;font-weight:600;margin-top:8px;border-radius:var(--radius-sm);justify-content:center;letter-spacing:.02em}

/* ===== Section divider ===== */
.section-divider{height:1px;background:var(--border);margin:16px 0}

/* ===== Custom size inputs ===== */
.custom-size-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.custom-size-row input{width:80px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface2);color:var(--text);font-size:13px;transition:border var(--transition),box-shadow var(--transition)}
.custom-size-row input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.custom-size-row input::placeholder{color:var(--text3)}
.custom-size-row span{color:var(--text3);font-size:14px}

/* ===== Config presets ===== */
.preset-row{display:flex;gap:6px;margin-bottom:12px}
.preset-row select{flex:1}
.preset-btn{width:34px;height:34px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:all var(--transition);flex-shrink:0}
.preset-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.preset-btn.danger:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-light)}

/* ===== Test connection ===== */
.test-result{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:var(--radius-xs);display:none}
.test-result.show{display:flex;align-items:center;gap:6px}
.test-result.ok{background:var(--primary-light);color:var(--primary)}
.test-result.fail{background:var(--danger-light);color:var(--danger)}

/* ===== Prompt history ===== */
.prompt-history-wrap{position:relative}
.prompt-history-btn{position:absolute;right:8px;top:8px;width:24px;height:24px;border-radius:6px;border:none;background:var(--surface3);cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;z-index:1}
.prompt-history-btn:hover{background:var(--primary-light);color:var(--primary)}
.prompt-history-wrap textarea{padding-right:36px}
.prompt-history-drop{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:10;max-height:200px;overflow-y:auto;display:none;margin-top:4px}
.prompt-history-drop.show{display:block}
.prompt-history-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prompt-history-item:last-child{border-bottom:none}
.prompt-history-item:hover{background:var(--primary-light);color:var(--primary)}

/* ===== Image info badge ===== */
.img-info{display:flex;flex-wrap:wrap;gap:4px;padding:4px 8px;border-top:1px solid var(--border);background:var(--surface3)}
.img-info span{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface);color:var(--text2);border:1px solid var(--border)}

/* ===== Templates ===== */
.tpl-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:all var(--transition)}
.tpl-card:hover{border-color:var(--primary);background:var(--primary-light)}
.tpl-card h4{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)}
.tpl-card p{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tpl-card .tpl-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tpl-card .tpl-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--primary-light);color:var(--primary);font-weight:500}

/* ===== Responsive ===== */
@media(max-width:900px){
  .main{flex-direction:column}

}

<script>
// ==================== State ====================
let lang = localStorage.getItem('gpt-img-lang') || 'zh';
let theme = localStorage.getItem('gpt-img-theme') || 'light';
function safeParseJSON(key,fallback){
  try{
    const raw=localStorage.getItem(key);
    return raw?JSON.parse(raw):fallback;
  }catch(e){
    console.warn('Ignoring invalid localStorage JSON for',key,e);
    localStorage.removeItem(key);
    return fallback;
  }
}
let config = safeParseJSON('gpt-img-config',{});
let historyList = [];
let uploadedFiles = [];
let currentTab = 'generate';
let isGenerating = false;
let currentLightboxSrc = '';
let maskHistory = [];

// ==================== i18n ====================
const i18n = {
  zh: {
    config:'配置接口', generate:'生成图片', edit:'编辑图片', model:'模型',

function t(k){return i18n[lang]?.[k]||k}
function getLabelTarget(el){
  if(!el) return null;
  if(el.classList?.contains('ui-label')) return el;
  return el.querySelector(':scope > .ui-label');
}
function setElementLabel(el,label){
  const target=getLabelTarget(el);
  if(target){
    target.textContent=label;
    target.dataset.originalText=label;
    return;
  }
  const textNode=[...el.childNodes].find(node=>node.nodeType===Node.TEXT_NODE&&node.textContent.trim());
  if(textNode){
    textNode.textContent=label;
    return;
  }
  el.textContent=label;
}
function syncLockedLabels(root=document){
  root.querySelectorAll?.('.ui-label').forEach(el=>{
    const current=(el.textContent||'').trim();
    const locked=(el.dataset.originalText||current).trim();
    if(!locked) return;
    if(!el.dataset.originalText) el.dataset.originalText=locked;
    if(current!==locked) el.textContent=locked;
    el.classList.add('notranslate');
    el.setAttribute('translate','no');
  });
}
let uiLabelSyncFrame=0;
function queueLockedLabelSync(){
  if(uiLabelSyncFrame) return;
  uiLabelSyncFrame=requestAnimationFrame(()=>{
    uiLabelSyncFrame=0;
    syncLockedLabels();
  });
}
function observeUiLabelIntegrity(){
  if(window.__uiLabelObserver||!document.body) return;
  const observer=new MutationObserver(mutations=>{
    const shouldSync=mutations.some(mutation=>{
      if(mutation.type==='characterData') return true;
      if(mutation.type==='childList') return true;
      return mutation.type==='attributes';
    });
    if(shouldSync) queueLockedLabelSync();
  });
  observer.observe(document.body,{
    subtree:true,
    childList:true,
    characterData:true,
    attributes:true,
    attributeFilter:['class','style','translate']
  });
  window.__uiLabelObserver=observer;
}
function applyI18n(){
  document.documentElement.lang=lang==='zh'?'zh-CN':'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{

  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{

  document.querySelectorAll('[data-label-zh][data-label-en]').forEach(el=>{

  const langBtn=document.getElementById('langBtn');

  syncLockedLabels();
}

// ==================== Mask Canvas ====================
let maskDrawing=false;
function initMaskCanvas(){
  const canvas=document.getElementById('mask-canvas');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000';ctx.fillRect(0,0,512,512);
  saveMaskState();
  canvas.addEventListener('mousedown',e=>{maskDrawing=true;drawMask(e)});
  canvas.addEventListener('mousemove',e=>{if(maskDrawing)drawMask(e)});
  canvas.addEventListener('mouseup',()=>{if(maskDrawing){maskDrawing=false;saveMaskState()}});
  canvas.addEventListener('mouseleave',()=>{if(maskDrawing){maskDrawing=false;saveMaskState()}});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();maskDrawing=true;drawMaskTouch(e)},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(maskDrawing)drawMaskTouch(e)},{passive:false});
  canvas.addEventListener('touchend',()=>{if(maskDrawing){maskDrawing=false;saveMaskState()}});
}
function drawMask(e){
  const canvas=document.getElementById('mask-canvas');
  const ctx=canvas.getContext('2d');
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const x=(e.clientX-rect.left)*scaleX;
  const y=(e.clientY-rect.top)*scaleY;
  const size=parseInt(document.getElementById('brush-size').value);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();ctx.arc(x,y,size/2,0,Math.PI*2);ctx.fill();
}
function drawMaskTouch(e){
  const touch=e.touches[0];
  drawMask({clientX:touch.clientX,clientY:touch.clientY});
}
function clearMask(){
  const canvas=document.getElementById('mask-canvas');
  const ctx=canvas.getContext('2d');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
  saveMaskState();
}
function saveMaskState(){
  const canvas=document.getElementById('mask-canvas');
  const ctx=canvas.getContext('2d');
  maskHistory.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  if(maskHistory.length>30)maskHistory.shift();
}
function undoMask(){
  if(maskHistory.length<=1)return;
  maskHistory.pop();
  const canvas=document.getElementById('mask-canvas');
  const ctx=canvas.getContext('2d');
  ctx.putImageData(maskHistory[maskHistory.length-1],0,0);
}
function toggleMask(){
  const c=document.getElementById('mask-container');
  c.classList.toggle('show');
  if(c.classList.contains('show')&&uploadedFiles.length>0){
    const img=new Image();
    img.onload=()=>{
      const canvas=document.getElementById('mask-canvas');
      const ctx=canvas.getContext('2d');
      canvas.width=img.width;canvas.height=img.height;
      ctx.drawImage(img,0,0);
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,img.width,img.height);
      maskHistory=[];
      saveMaskState();
    };
    img.src=uploadedFiles[0].data;
  }
}
function getMaskBase64(){
  const canvas=document.getElementById('mask-canvas');
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width;tmp.height=canvas.height;
  const ctx=tmp.getContext('2d');
  const srcCtx=canvas.getContext('2d');
  const imgData=srcCtx.getImageData(0,0,canvas.width,canvas.height);
  const outData=ctx.createImageData(canvas.width,canvas.height);
  for(let i=0;i<imgData.data.length;i+=4){
    const a=imgData.data[i+3];
    const v=a>128?0:255;
    outData.data[i]=v;outData.data[i+1]=v;outData.data[i+2]=v;outData.data[i+3]=255;
  }
  ctx.putImageData(outData,0,0);
  return tmp.toDataURL('image/png').split(',')[1];
}

function getHeaders(includeJson=true){

function dataUrlToBlob(dataUrl){
  const [meta,data='']=dataUrl.split(',');
  const mime=meta.match(/data:([^;]+)/)?.[1]||'application/octet-stream';
  const binary=atob(data);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}
async function toUploadBlob(fileLike,fallbackName){
  if(fileLike?.file instanceof File)return {blob:fileLike.file,name:fileLike.file.name||fallbackName};
  if(fileLike?.data?.startsWith('data:'))return {blob:dataUrlToBlob(fileLike.data),name:fileLike.name||fallbackName};
  if(fileLike?.data){
    const resp=await fetch(fileLike.data);
    if(!resp.ok)throw new Error('无法读取待编辑图片');
    return {blob:await resp.blob(),name:fileLike.name||fallbackName};
  }
  throw new Error('缺少待编辑图片数据');
}
async function buildEditFormData(opts){
  const form=new FormData();
  form.append('model',opts.model);
  form.append('prompt',opts.prompt);
  form.append('n',String(opts.n));
  if(opts.size&&opts.size!=='auto')form.append('size',opts.size);
  if(opts.quality&&opts.quality!=='auto')form.append('quality',opts.quality);
  if(opts.moderation&&opts.moderation!=='auto')form.append('moderation',opts.moderation);
  if(opts.streamOn){
    form.append('stream','true');
    form.append('partial_images','2');
  }
  for(let i=0;i<opts.files.length;i++){
    const {blob,name}=await toUploadBlob(opts.files[i],`image-${i+1}.png`);
    form.append('image',blob,name);
  }
  if(opts.maskBase64){
    const maskBlob=dataUrlToBlob('data:image/png;base64,'+opts.maskBase64);
    form.append('mask',maskBlob,'mask.png');
  }
  return form;
}
async function readImageStreamResponse(resp,fmt,upscaleFactor,info){
  const reader=resp.body?.getReader();
  if(!reader)throw new Error('当前响应不支持流式读取');
  const decoder=new TextDecoder();
  let buffer='';
  let finalData=null;
  let previewSrc='';
  let step=0;

  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const lines=buffer.split('\n');
    buffer=lines.pop()||'';

    for(const rawLine of lines){
      const line=rawLine.trim();
      if(!line.startsWith('data:'))continue;
      const data=line.slice(5).trim();
      if(!data||data==='[DONE]')continue;
      try{
        const parsed=JSON.parse(data);
        const type=parsed.type||'';
        const b64=parsed.partial_image_b64||parsed.b64_json;
        const url=parsed.url;

        if(type.includes('partial')&&b64){
          previewSrc='data:image/png;base64,'+b64;
          showStreamPreview(previewSrc);
          step++;
          showProgress(Math.min(75,30+step*15));
          continue;
        }
        if(parsed.data){
          finalData=parsed;
          continue;
        }
        if((type.endsWith('.completed')||type.endsWith('.result')||!type)&&(b64||url)){
          finalData={data:[b64?{b64_json:b64}:{url}]};
        }
      }catch(e){}
    }
  }

  hideStreamPreview();
  showProgress(80);

  if(finalData?.data){
    await processResults(finalData,fmt,upscaleFactor,info);
    return;
  }
  if(previewSrc){
    let imgSrc=previewSrc;
    if(upscaleFactor>1)imgSrc=await upscaleImage(imgSrc,upscaleFactor);
    imgSrc=await convertFormat(imgSrc,fmt);
    document.getElementById('result-images').innerHTML=makeResultCard(imgSrc,fmt,info);
    addHistory(imgSrc);
    return;
  }
  throw new Error('流式响应中未找到图片数据');
}

// ==================== Auto Translate ====================
function hasChinese(str){return /[一-鿿]/.test(str)}
async function translatePrompt(text){
  if(!hasChinese(text))return text;
  try{
    const models=['gpt-4o-mini','gpt-4o','gpt-4','gpt-3.5-turbo'];
    let lastErr;
    for(const m of models){
      try{
        const resp=await fetch(config.baseUrl+'/chat/completions',{
          method:'POST',
          headers:getHeaders(),
          body:JSON.stringify({
            model:m,
            messages:[{role:'system',content:'You are a prompt translator for AI image generation. Translate the user\'s Chinese text into an English prompt optimized for image generation. If the input is a short description, expand it into a detailed, vivid prompt with style, lighting, composition details. Output ONLY the English prompt, nothing else.'},{role:'user',content:text}],
            max_tokens:500,
            temperature:0.3
          })
        });
        if(!resp.ok){lastErr=resp.status;continue}
        const json=await resp.json();
        const translated=json.choices?.[0]?.message?.content?.trim();
        if(translated)return translated;
      }catch(e){lastErr=e}
    }
    return text;
  }catch(e){
    console.warn('Translate failed, using original:',e);
    return text;
  }
}

// ==================== Local Upscale ====================
function upscaleImage(imgSrc,factor){
  return new Promise(resolve=>{
    if(factor<=1){resolve(imgSrc);return}
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxPx=factor===2?2048:4096;
      let w=img.width,h=img.height;
      const ratio=Math.min(maxPx/w,maxPx/h,4);
      if(ratio<=1){resolve(imgSrc);return}
      canvas.width=Math.round(w*ratio);canvas.height=Math.round(h*ratio);
      const ctx=canvas.getContext('2d');
      ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror=()=>resolve(imgSrc);
    img.src=imgSrc;
  });
}

// ==================== Convert format ====================
function convertFormat(imgSrc,fmt){
  return new Promise(resolve=>{
    if(fmt==='png'){resolve(imgSrc);return}
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      c.getContext('2d').drawImage(img,0,0);
      resolve(c.toDataURL('image/'+fmt,0.92));
    };
    img.onerror=()=>resolve(imgSrc);
    img.src=imgSrc;
  });
}

let idb=null;
function openIDB(){
  return new Promise((resolve,reject)=>{
    if(idb){resolve(idb);return}
    const req=indexedDB.open('gptImgHistory',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('images',{keyPath:'id'})};
    req.onsuccess=e=>{idb=e.target.result;resolve(idb)};
    req.onerror=e=>reject(e);
  });
}
async function saveFullImage(id,dataUrl){
  try{
    const db=await openIDB();
    const blob=await (await fetch(dataUrl)).blob();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction('images','readwrite');
      tx.objectStore('images').put({id,blob});
      tx.oncomplete=resolve;tx.onerror=reject;
    });
  }catch(e){console.warn('IDB save failed:',e)}
}
async function getFullImage(id){
  try{
    const db=await openIDB();
    return new Promise((resolve,reject)=>{
      const tx=db.transaction('images','readonly');
      const req=tx.objectStore('images').get(id);
      req.onsuccess=()=>{
        if(req.result&&req.result.blob){
          const r=new FileReader();
          r.onload=()=>resolve(r.result);
          r.onerror=()=>resolve(null);
          r.readAsDataURL(req.result.blob);
        }else resolve(null);
      };
      req.onerror=()=>resolve(null);
    });
  }catch(e){return null}
}
async function clearIDB(){
  try{
    const db=await openIDB();
    await new Promise((resolve,reject)=>{
      const tx=db.transaction('images','readwrite');
      tx.objectStore('images').clear();
      tx.oncomplete=resolve;tx.onerror=reject;
    });
  }catch(e){}
}

function getThumbFromDataUrl(dataUrl,maxSize=80){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const ratio=Math.min(maxSize/img.width,maxSize/img.height,1);
      c.width=Math.round(img.width*ratio);c.height=Math.round(img.height*ratio);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.6));
    };
    img.onerror=()=>resolve('');
    img.src=dataUrl;
  });
}

async function addHistory(dataUrl){
  const thumb=await getThumbFromDataUrl(dataUrl);
  const id='img_'+(historyIdCounter++);
  saveFullImage(id,dataUrl);
  historyList.unshift({url:thumb,id,time:Date.now()});
  if(historyList.length>80)historyList=historyList.slice(0,80);
  saveHistoryToStorage();
  renderHistory();
}
function renderHistory(){
  const sec=document.getElementById('history-section');
  const grid=document.getElementById('history-grid');
  if(historyList.length===0){sec.style.display='none';return}
  sec.style.display='block';
  grid.innerHTML=historyList.map((h,i)=>
    `<div class="history-item" onclick="viewHistory(${i})"><img src="${h.url}" loading="lazy"></div>`
  ).join('');
}
async function viewHistory(i){
  const h=historyList[i];
  if(h.id){
    const full=await getFullImage(h.id);
    openLightbox(full||h.url);
  }else{
    openLightbox(h.url);
  }
}
async function clearHistory(){
  historyList=[];
  localStorage.removeItem('gpt-img-history');
  await clearIDB();
  renderHistory();
}

// ==================== Lightbox ====================
function openLightbox(src){
  currentLightboxSrc=src;
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
function downloadLightboxImage(){
  const a=document.createElement('a');
  a.href=currentLightboxSrc;
  a.download='gpt-image-'+Date.now()+'.png';
  a.click();
}
function sendLightboxToEdit(){
  switchTab('edit');
  uploadedFiles=[{name:'sent.png',data:currentLightboxSrc,file:null}];
  renderUploadPreview();
  closeLightbox();
}

// ==================== Download ====================
function downloadResultImage(imgSrc,fmt){
  const a=document.createElement('a');
  if(imgSrc.startsWith('data:')){
    a.href=imgSrc;
    a.download='gpt-image-'+Date.now()+'.'+fmt;
    a.click();
  }else{
    fetch(imgSrc).then(r=>r.blob()).then(blob=>{
      a.href=URL.createObjectURL(blob);
      a.download='gpt-image-'+Date.now()+'.'+fmt;
      a.click();
      URL.revokeObjectURL(a.href);
    }).catch(()=>window.open(imgSrc,'_blank'));
  }
}

// ==================== Result Card ====================
function makeResultCard(imgSrc,fmt,info){
  const badges = info ? `<div class="img-info">${[
    info.model ? `<span>${info.model}</span>` : '',
    info.size ? `<span>${info.size}</span>` : '',
    info.quality && info.quality!=='auto' ? `<span>${info.quality}</span>` : '',
    info.format ? `<span>${info.format.toUpperCase()}</span>` : ''
  ].filter(Boolean).join('')}</div>` : '';
  return `<div class="result-card">
    <img src="${imgSrc}" onclick="openLightbox(this.src)" loading="lazy">
    ${badges}
    <div class="actions">
      <button class="btn btn-sm notranslate" translate="no" onclick="downloadResultImage(this.closest('.result-card').querySelector('img').src,'${fmt}')"><span class="ui-label notranslate" translate="no">下载</span></button>
      <button class="btn btn-sm notranslate" translate="no" onclick="sendToEdit(this)"><span class="ui-label notranslate" translate="no">发送到编辑</span></button>
    </div>
  </div>`;
}

// ==================== Send to Edit ====================
function sendToEdit(btn){
  const card=btn.closest('.result-card');
  const imgSrc=card.querySelector('img').src;
  switchTab('edit');
  uploadedFiles=[{name:'sent.png',data:imgSrc,file:null}];
  renderUploadPreview();
}

// ==================== Process Results ====================
async function processResults(json,fmt,upscaleFactor,info){
  const resultsDiv=document.getElementById('result-images');
  if(!json?.data||json.data.length===0){
    throw new Error('No images in response');
  }
  for(const item of json.data){
    let imgSrc;
    if(item.b64_json) imgSrc='data:image/png;base64,'+item.b64_json;
    else if(item.url) imgSrc=item.url;
    else continue;
    if(upscaleFactor>1) imgSrc=await upscaleImage(imgSrc,upscaleFactor);
    imgSrc=await convertFormat(imgSrc,fmt);
    resultsDiv.innerHTML+=makeResultCard(imgSrc,fmt,info);
    addHistory(imgSrc);
  }
}

// ==================== Generate Image ====================
async function generateImage(){
  if(isGenerating)return;
  if(!config.baseUrl||!config.apiKey){showToast('请先配置 Base URL 和 API Key','error');showConfig();return}

  const model=document.getElementById('gen-model').value;
  const rawPrompt=document.getElementById('gen-prompt').value.trim();
  if(!rawPrompt){showToast('请输入提示词','error');return}
  addPromptToHistory(rawPrompt);
  const translateOn=document.getElementById('gen-translate-toggle').classList.contains('on');
  let prompt=rawPrompt;
  if(translateOn&&hasChinese(rawPrompt)){
    showToast('正在翻译提示词...','success');
    prompt=await translatePrompt(rawPrompt);
  }
  const n=parseInt(document.getElementById('gen-qty').value)||1;
  const size=getSizeStr('gen');
  const quality=getRadio('gen-quality');
  const fmt=getRadio('gen-format');
  const moderation=getRadio('gen-moderation');
  const upscaleFactor=parseInt(getRadio('gen-upscale'));
  const streamOn=document.getElementById('gen-stream-toggle').classList.contains('on');

  const body={model,prompt,n};
  if(size!=='auto') body.size=size;
  if(model==='gpt-image-1'||model==='gpt-image-2'){
    if(quality!=='auto') body.quality=quality;
    if(moderation!=='auto') body.moderation=moderation;
  }
  if(streamOn){
    body.stream=true;
    body.partial_images=2;
  }

  showLoading('正在生成...');
  document.getElementById('result-images').innerHTML='';
  showProgress(10);

  const genInfo={model,size:body.size||'auto',quality,format:fmt};

  try{
    const url=config.baseUrl+'/images/generations';
    const resp=await fetch(url,{method:'POST',headers:getHeaders(),body:JSON.stringify(body)});

    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error?.message||'HTTP '+resp.status);
    }

    const contentType=resp.headers.get('content-type')||'';

    if(streamOn && (contentType.includes('text/event-stream')||contentType.includes('application/octet-stream'))){
      showProgress(30);
      await readImageStreamResponse(resp,fmt,upscaleFactor,genInfo);
    } else {
      showProgress(60);
      const json=await resp.json();
      showProgress(80);
      await processResults(json,fmt,upscaleFactor,genInfo);
    }

    showProgress(100);
    hideStreamPreview();
    hideLoading();
  }catch(e){
    hideLoading();hideStreamPreview();
    showToast('生成失败: '+e.message,'error');
  }
}

// ==================== Edit Image ====================
async function editImage(){
  if(isGenerating)return;
  if(!config.baseUrl||!config.apiKey){showToast('请先配置 Base URL 和 API Key','error');showConfig();return}
  if(uploadedFiles.length===0){showToast('请上传源图片','error');return}

  const model=document.getElementById('edit-model').value;
  const rawPrompt=document.getElementById('edit-prompt').value.trim();
  if(!rawPrompt){showToast('请输入提示词','error');return}
  addPromptToHistory(rawPrompt);
  const translateOn=document.getElementById('edit-translate-toggle').classList.contains('on');
  let prompt=rawPrompt;
  if(translateOn&&hasChinese(rawPrompt)){
    showToast('正在翻译提示词...','success');
    prompt=await translatePrompt(rawPrompt);
  }
  const n=parseInt(document.getElementById('edit-qty').value)||1;
  const sizeVal=getSizeStr('edit');
  const quality=getRadio('edit-quality');
  const fmt=getRadio('edit-format');
  const moderation=getRadio('edit-moderation');
  const upscaleFactor=parseInt(getRadio('edit-upscale'));
  const streamOn=document.getElementById('edit-stream-toggle').classList.contains('on');

  showLoading('正在编辑...');
  document.getElementById('result-images').innerHTML='';
  showProgress(10);

  const editInfo={model,size:sizeVal!=='auto'?sizeVal:'auto',quality,format:fmt};

  try{
    const maskContainer=document.getElementById('mask-container');
    const maskBase64=maskContainer.classList.contains('show')?getMaskBase64():'';
    const body=await buildEditFormData({
      model,prompt,n,
      size:sizeVal,
      quality,
      moderation,
      streamOn,
      files:uploadedFiles,
      maskBase64
    });

    showProgress(30);
    const resp=await fetch(config.baseUrl+'/images/edits',{
      method:'POST',headers:getHeaders(false),body
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error?.message||'HTTP '+resp.status);
    }
    const contentType=resp.headers.get('content-type')||'';
    if(streamOn && (contentType.includes('text/event-stream')||contentType.includes('application/octet-stream'))){
      await readImageStreamResponse(resp,fmt,upscaleFactor,editInfo);
    }else{
      showProgress(60);
      const json=await resp.json();
      showProgress(80);
      await processResults(json,fmt,upscaleFactor,editInfo);
    }
    showProgress(100);
    hideLoading();
  }catch(e){
    hideLoading();
    showToast('编辑失败: '+e.message,'error');
  }
}

function initTemplates(){
  const cats=[...new Set(TEMPLATES.map(t=>t.cat))];
  const sel=document.getElementById('tpl-category');
  sel.innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  renderTemplates();
}
function renderTemplates(){
  const cat=document.getElementById('tpl-category').value;
  const list=document.getElementById('tpl-list');
  const items=TEMPLATES.filter(t=>t.cat===cat);
  list.innerHTML=items.map((t,i)=>{
    const idx=TEMPLATES.indexOf(t);
    return `<div class="tpl-card notranslate" translate="no" onclick="useTemplate(${idx})">
      <h4 class="ui-label notranslate" translate="no">${t.name}</h4>

      <div class="tpl-tags">${t.tags.map(tag=>`<span class="tpl-tag notranslate" translate="no">${tag}</span>`).join('')}</div>
    </div>`;
  }).join('');
}
function useTemplate(idx){
  const t=TEMPLATES[idx];
  switchTab('generate');
  const translateOn=document.getElementById('gen-translate-toggle').classList.contains('on');
  document.getElementById('gen-prompt').value=translateOn?t.desc:t.prompt;
}

// ==================== Config Presets ====================
function getPresets(){
  return safeParseJSON('gpt-img-presets',[]);
}
function savePresetsToStorage(presets){
  try{localStorage.setItem('gpt-img-presets',JSON.stringify(presets))}catch(e){}
}
function renderPresetDropdown(){
  const sel=document.getElementById('cfg-preset-select');
  const presets=getPresets();
  sel.innerHTML='<option value="">-- 选择预设 --</option>'+
    presets.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');
}
function loadPreset(){
  const sel=document.getElementById('cfg-preset-select');
  const idx=parseInt(sel.value);
  if(isNaN(idx))return;
  const presets=getPresets();
  if(presets[idx]){
    document.getElementById('cfg-baseurl').value=presets[idx].baseUrl||'';
    document.getElementById('cfg-apikey').value=presets[idx].apiKey||'';
  }
}
function savePreset(){
  const baseUrl=document.getElementById('cfg-baseurl').value.trim();
  const apiKey=document.getElementById('cfg-apikey').value.trim();
  if(!baseUrl){showToast('请输入 Base URL','error');return}
  const name=prompt('输入预设名称:',baseUrl.replace(/^https?:\/\//,'').split('/')[0]);
  if(!name)return;
  const presets=getPresets();
  presets.push({name,baseUrl,apiKey});
  savePresetsToStorage(presets);
  renderPresetDropdown();
  showToast('预设已保存','success');
}
function deletePreset(){
  const sel=document.getElementById('cfg-preset-select');
  const idx=parseInt(sel.value);
  if(isNaN(idx))return;
  const presets=getPresets();
  presets.splice(idx,1);
  savePresetsToStorage(presets);
  sel.value='';
  renderPresetDropdown();
  showToast('预设已删除','success');
}

// ==================== Test Connection ====================
async function testConnection(){
  const baseUrl=document.getElementById('cfg-baseurl').value.trim().replace(/\/+$/,'');
  const apiKey=document.getElementById('cfg-apikey').value.trim();
  const resultEl=document.getElementById('test-result');
  resultEl.className='test-result show';
  resultEl.textContent='正在测试...';
  resultEl.style.color='var(--text2)';
  resultEl.style.background='var(--surface3)';
  if(!baseUrl||!apiKey){
    resultEl.className='test-result show fail';
    resultEl.textContent='✗ 请填写 Base URL 和 API Key';
    return;
  }
  try{
    const resp=await fetch(baseUrl+'/models',{
      headers:{'Authorization':'Bearer '+apiKey},
      signal:AbortSignal.timeout(10000)
    });
    if(resp.ok){
      resultEl.className='test-result show ok';
      resultEl.textContent='✓ 连接成功';
    }else{
      const err=await resp.json().catch(()=>({}));
      resultEl.className='test-result show fail';
      resultEl.textContent='✗ HTTP '+resp.status+(err.error?.message?' - '+err.error.message:'');
    }
  }catch(e){
    resultEl.className='test-result show fail';
    resultEl.textContent='✗ 连接失败: '+e.message;
  }
}

// ==================== Prompt History ====================
function getPromptHistory(){
  return safeParseJSON('gpt-img-prompt-history',[]);
}
function addPromptToHistory(prompt){
  if(!prompt)return;
  let list=getPromptHistory();
  list=list.filter(p=>p!==prompt);
  list.unshift(prompt);
  if(list.length>50)list=list.slice(0,50);
  localStorage.setItem('gpt-img-prompt-history',JSON.stringify(list));
}
function togglePromptHistory(prefix){
  const drop=document.getElementById(prefix+'-prompt-history');
  if(drop.classList.contains('show')){drop.classList.remove('show');return}
  const list=getPromptHistory();
  if(list.length===0){showToast('暂无提示词历史','error');return}
  drop.innerHTML=list.map(p=>
    `<div class="prompt-history-item" onclick="selectPromptHistory('${prefix}',this)">${p.replace(/</g,'&lt;')}</div>`
  ).join('');
  drop.classList.add('show');
}
function selectPromptHistory(prefix,el){
  const ta=document.getElementById(prefix+'-prompt');
  ta.value=el.textContent;
  document.getElementById(prefix+'-prompt-history').classList.remove('show');
}
// Close prompt history when clicking outside
document.addEventListener('click',e=>{
  if(!e.target.closest('.prompt-history-wrap')){
    document.querySelectorAll('.prompt-history-drop').forEach(d=>d.classList.remove('show'));
  }
});

// ==================== Keyboard Shortcuts ====================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeLightbox();
    hideConfig();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
    e.preventDefault();
    if(currentTab==='generate')generateImage();
    else editImage();
  }
});

// ==================== Boot ====================
init();
</script>
